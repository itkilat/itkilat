<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Discord Saya</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c2f33;
            color: #ffffff;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        .container {
            background-color: #23272a;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #5865F2; }
        .btn {
            background-color: #5865F2;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #4752c4; }
        .status {
            margin-top: 20px;
            font-size: 0.9em;
            color: #99aab5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Bot Discord Saya</h1>
        <p>Selamat datang di halaman resmi bot Discord saya.</p>
        <p>Bot ini dirancang untuk membantu manajemen server, musik, dan hiburan.</p>
        
        <!-- Link Invite Bot -->
        <a href="LINK_INVITE_BOT_ANDA_DISINI" class="btn">Invite Bot ke Server</a>
        
        <div class="status">
            <p>Status Server: <span style="color: #43b581;">● Online</span></p>
            <p>Endpoint Interaksi: Terkonfigurasi</p>
        </div>
    </div>
</body>
</html>
